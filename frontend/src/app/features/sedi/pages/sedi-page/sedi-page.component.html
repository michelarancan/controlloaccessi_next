<h1>Visualizzazione anagrafe delle sedi</h1>

<button (click)="apriForm()" class="btn-aggiungi">Aggiungi una nuova sede</button><br><br>
@if (showForm) {
    <app-sede-form [sede]="sedeInModifica" (salva)="salvaSede($event)" (annulla)="chiudiForm()"></app-sede-form>
}


@if (showDeletePopup) {
    <div class="form-container">
        <div class="popup-box">
            <h2>Conferma eliminazione</h2>

            <p>Vuoi davvero eliminare questa sede?</p>

            <div class="popup-buttons">
                <button type="button" class="btn-conferma" (click)="confermaEliminazione()">Sì</button>
                <button type="button" class="btn-annulla" (click)="chiudiPopupElimina()">No
                </button>
            </div>
        </div>
    </div>
}


<div class="search-container">
    <select [(ngModel)]="campoRicerca">
        <option value="sede">Sede</option>
        <option value="ufficio">Ufficio</option>
    </select>

    <input type="text" [(ngModel)]="testoRicerca" (keyup.enter)="cercaSedi()" placeholder="Cerca...">
    <button type="button" (click)="cercaSedi()">Cerca</button>
    <button type="button" (click)="resettaRicerca()">Reset</button>
</div>

<table>
    <thead>
        <tr>
            <th>Sede</th>
            <th>Ufficio</th>
            <th>Azioni</th>
        </tr>
    </thead>
    <tbody>
        <!-- riga per ogni entry della tabella -->
         @for (sede of sedi; track sede.id) {
            <tr>
                <td>{{ sede.sede }}</td>
                <td>{{ sede.ufficio }}</td>
                <td class="button-cell">
                    <button class="btn-modifica" (click)="modificaSede(sede)">Modifica</button>
                    <button class="btn-elimina" (click)="apriPopupElimina(sede.id)">Elimina</button>
                </td>
            </tr>
         }
    </tbody>
</table>

@if(showToast) {
    <div class="toast" [class.success]="toastType === 'success'" [class.error]="toastType === 'error'">{{ toastMessage }}</div>
}
